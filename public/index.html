<!DOCTYPE html>
<html>
<head>
    <title>User Portal</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-elevated: #161b22;
            --bg-subtle: #21262d;
            --border: #30363d;
            --border-muted: #21262d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --text-subtle: #6e7681;
            --accent: #58a6ff;
            --accent-muted: rgba(88, 166, 255, 0.15);
            --success: #3fb950;
            --success-muted: rgba(63, 185, 80, 0.15);
            --error: #f85149;
            --error-muted: rgba(248, 81, 73, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            transition: border-color 0.15s ease;
        }

        .stat-card:hover {
            border-color: var(--border);
        }

        .stat-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 600;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .stat-card.accent .stat-value {
            color: var(--accent);
        }

        .stat-card.success .stat-value {
            color: var(--success);
        }

        .card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .card-body {
            padding: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
        }

        input {
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-muted);
        }

        input::placeholder {
            color: var(--text-subtle);
        }

        .btn {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: #79b8ff;
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-danger {
            background: transparent;
            color: var(--error);
            border-color: var(--border);
            padding: 4px 10px;
            font-size: 12px;
        }

        .btn-danger:hover {
            background: var(--error-muted);
            border-color: var(--error);
        }

        .form-actions {
            grid-column: 1 / -1;
            display: flex;
            justify-content: flex-end;
            padding-top: 8px;
        }

        .msg {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .msg.success {
            background: var(--success-muted);
            border: 1px solid rgba(63, 185, 80, 0.4);
            color: var(--success);
        }

        .msg.error {
            background: var(--error-muted);
            border: 1px solid rgba(248, 81, 73, 0.4);
            color: var(--error);
        }

        .user-list {
            display: flex;
            flex-direction: column;
        }

        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-muted);
            transition: background 0.15s ease;
        }

        .user-item:last-child {
            border-bottom: none;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .user-meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            gap: 12px;
        }

        .user-actions {
            display: flex;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 500;
            border-radius: 12px;
            background: var(--bg-subtle);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .badge.adult {
            background: var(--accent-muted);
            color: var(--accent);
            border-color: rgba(88, 166, 255, 0.3);
        }

        .badge.minor {
            background: var(--success-muted);
            color: var(--success);
            border-color: rgba(63, 185, 80, 0.3);
        }

        @media (max-width: 768px) {
            .container {
                padding: 24px 16px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .user-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .user-actions {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>User Portal</h1>
            <p>Manage and view user statistics</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card accent">
                <div class="stat-label">Total Users</div>
                <div class="stat-value" id="total">0</div>
            </div>
            <div class="stat-card success">
                <div class="stat-label">Adults (18+)</div>
                <div class="stat-value" id="adults">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Minors (&lt;18)</div>
                <div class="stat-value" id="minors">0</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Add New User</div>
            <div class="card-body">
                <div id="msg"></div>
                <form id="userForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="john@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="age">Age</label>
                            <input type="number" id="age" placeholder="25" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" placeholder="Min 6 characters" required>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" id="submitBtn">Register</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">All Users</div>
            <div class="card-body">
                <div class="user-list" id="users"></div>
            </div>
        </div>
    </div>

    <script>
        loadUsers();

        document.getElementById('userForm').onsubmit = function(e) {
            e.preventDefault();

            var btn = document.getElementById('submitBtn');
            var originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner"></span> Registering...';
            btn.disabled = true;

            var data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                age: document.getElementById('age').value,
                password: document.getElementById('password').value
            };

            fetch('/submit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    showMsg('User added successfully', 'success');
                    document.getElementById('userForm').reset();
                    loadUsers();
                } else {
                    showMsg(data.error, 'error');
                }
            })
            .catch(function(err) {
                showMsg('Error adding user', 'error');
            })
            .finally(function() {
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        };

        function loadUsers() {
            fetch('/api/users')
            .then(function(res) { return res.json(); })
            .then(function(users) {
                var total = users.length;
                var adults = users.filter(function(u) { return u.age >= 18; }).length;
                var minors = users.filter(function(u) { return u.age < 18; }).length;

                document.getElementById('total').textContent = total;
                document.getElementById('adults').textContent = adults;
                document.getElementById('minors').textContent = minors;

                var html = '';
                users.forEach(function(user) {
                    var badgeClass = user.age >= 18 ? 'adult' : 'minor';
                    var badgeText = user.age >= 18 ? 'Adult' : 'Minor';
                    html += '<div class="user-item">';
                    html += '<div class="user-info">';
                    html += '<div class="user-name">' + escapeHtml(user.name) + '</div>';
                    html += '<div class="user-meta">';
                    html += '<span>' + escapeHtml(user.email) + '</span>';
                    html += '<span>Age: ' + user.age + '</span>';
                    html += '<span class="badge ' + badgeClass + '">' + badgeText + '</span>';
                    html += '</div></div>';
                    html += '<div class="user-actions">';
                    html += '<button class="btn btn-danger" onclick="deleteUser(' + user.id + ')">Delete</button>';
                    html += '</div></div>';
                });

                if (users.length === 0) {
                    html = '<div class="empty-state">No users yet. Add your first user above.</div>';
                }
                document.getElementById('users').innerHTML = html;
            });
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function deleteUser(id) {
            if (confirm('Are you sure you want to delete this user?')) {
                fetch('/delete/' + id, {method: 'POST'})
                .then(function() {
                    loadUsers();
                });
            }
        }

        function showMsg(text, type) {
            var msgDiv = document.getElementById('msg');
            msgDiv.innerHTML = '<div class="msg ' + type + '">' + text + '</div>';
            setTimeout(function() {
                msgDiv.innerHTML = '';
            }, 3000);
        }
    </script>
</body>
</html>
